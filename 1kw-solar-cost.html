<h1>1 kW Solar System Cost in India</h1>

<p>
1 kW solar system సాధారణంగా ఒక చిన్న ఇంటి electricity usage కి సరిపోతుంది.
</p>

<ul>
<li>Average cost → ₹60,000 – ₹80,000</li>
<li>Subsidy తర్వాత cost → ₹30,000 – ₹50,000</li>
<li>Daily generation → 4 – 5 units</li>
<li>Yearly generation → 1500 units</li>
</ul>
